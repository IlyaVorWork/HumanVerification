---
gin:
  - name: human_verification
    port: 8080
    enabled: true
    commonService:
      enabled: true
    sw:
      enabled: true
      path: "human/sw"
      jsonPath: "docs"
postgres:
  - name: human_verification_postgres
    enabled: true
    addr: "${POSTGRES_ADDR}"
    user: "${POSTGRES_USER}"
    pass: "${POSTGRES_PASS}"
    database:
      - name: "${POSTGRES_DB}"
        autoCreate: true